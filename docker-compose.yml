services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: energy
      POSTGRES_PASSWORD: energy
      POSTGRES_DB: energy_monitor
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy -d energy_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles:
      - redis

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://energy:energy@postgres:5432/energy_monitor
      SYNC_DATABASE_URL: postgresql://energy:energy@postgres:5432/energy_monitor
      SECRET_KEY: ${SECRET_KEY:-troque-esta-chave-em-producao-min-32-chars!!}
      SOLARMAN_USE_MOCK: "true"
      TUYA_USE_MOCK: "true"
      DEFAULT_ADMIN_USER: admin
      DEFAULT_ADMIN_PASSWORD: admin123
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
